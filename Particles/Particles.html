<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Particle</title>
<style>
* {
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  -webkit-touch-callout: none;
  margin: 0;
  padding: 0;
}
html, body {
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-user-drag: none;
  background-color: black;
}
#particles {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
}
</style>
<script>console.error('Cannot load particles.min.js')</script>
<script>
window.onload = function () {
    particlesJS('particles', {
        particles: {
            number: { value: 125 },
            color: { value: "#107C10" },
            shape: { type: "circle" },
            opacity: {
                value: 0.9,
                random: true,
                anim: { enable: true, speed: 1, opacity_min: 0.5, sync: false }
            },
            size: {
                value: 3,
                random: true,
                anim: { enable: true, speed: 2, size_min: 1, sync: false }
            },
            line_linked: {
                enable: true,
                distance: 125,
                color: "#10A010",
                opacity: 0.8,
                width: 2
            },
            move: {
                enable: true,
                speed: 1.5,
                direction: "none",
                random: false,
                straight: false,
                out_mode: "out",
                attract: { enable: false }
            }
        },
        interactivity: {
            detect_on: "canvas",
            events: {
                onhover: { enable: true, mode: "grab,bubble" },
                onclick: { enable: true, mode: "repulse" },
                resize: true
            },
            modes: {
                grab: { distance: 150, line_linked: { opacity: 0.8 } },
                bubble: { distance: 200, size: 5, duration: 2, opacity: 0.8 },
                repulse: { distance: 150, duration: 0.8 },
                push: { particles_nb: 4 },
                remove: { particles_nb: 4 }
            }
        },
        retina_detect: true
    });
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturestart', e => e.preventDefault());
}
</script>
</head>
<body>
<div id="particles"></div>
</body>
</html>
